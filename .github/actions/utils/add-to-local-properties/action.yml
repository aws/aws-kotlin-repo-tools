name: Append to local.properties
description: Appends the specified input to local.properties (creates file if it doesn't exist)

inputs:
  working-directory:
    description: The path to local.properties root dir
    default: .
  addition:
    description: What you want to add to local.properties

runs:
  using: composite
  steps:
    - name: Touch local.properties
      shell: bash
      run: |
        echo "Running mkdir for working directory"
        mkdir -p ${{inputs.working-directory}}
        
        echo "Changing dir to '${{inputs.working-directory}}'"
        cd ${{inputs.working-directory}}
        
        echo "Touching local.properties"
        touch local.properties
        
        echo "Running ls -al:"
        ls -al

    - name: Append to local.properties
      shell: bash
      run: |
        echo "Changing dir to '${{inputs.working-directory}}'"
        cd ${{inputs.working-directory}}
        
        echo "Writing to local.properties"
        echo "${{inputs.addition}}" >> local.properties
        
        echo "File contents:"
        cat local.properties
