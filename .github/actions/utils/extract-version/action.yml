name: Extract version from libs.versions.toml
description: Extracts the specified version from a libs.versions.toml file

inputs:
  working-directory:
    description: The directory in which to run the action
    default: .
  version-name:
    description: The name of the version to extract e.g. 'crt-kotlin-version'
  file-path:
    description: The name of the file to look for the version in

runs:
  using: composite
  steps:
    - name: Extract version
      working-directory: ${{inputs.working-directory}}
      shell: bash
      run: |
        echo "Looking for version '${{inputs.version-name}}' in '${{inputs.file-path}}'"
        version=$(awk -F'=' -v k="${{inputs.version-name}}" '$1 ~ "^"k"[[:space:]]*" { gsub(/[[:space:]]*/, "", $2); gsub(/"/,"",$2); print $2 }' ${{inputs.file-path}})
        echo "Found version '$version'"
        
        echo "Saving version to GitHub output"
        echo "result=$version" >> $GITHUB_OUTPUT
        echo $GITHUB_OUTPUT
