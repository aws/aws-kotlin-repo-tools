name: Merge Main
description: Merges main into feature branches (*-main)
inputs:
  exempt-branches:
    description: Feature branches that are exempt from receiving merges from main (comma separated, no blank space)
  ci-user-pat:
    description: The CI user's personal access token to write to the repo

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ inputs.ci-user-pat }}

    - name: Set up Git
      shell: bash
      run: |
        git config user.name aws-sdk-kotlin-ci
        git config user.email "aws-kotlin-sdk-automation@amazon.com"

    - name: Run Script
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.ci-user-pat }}
      run: |
        input=${{ inputs.exempt-branches }}

        function fetch_latest_changes() {
          echo "Fetching the latest remote branches"
          git fetch --all
        }

        fetch_latest_changes

        function find_feature_branches() {
          echo "Searching for feature branches"
          feature_branches=($(git branch -r --list "*-main" | sed 's|origin/||'))

          if [ ${#feature_branches[@]} -eq 0 ]; then
            echo "...none found"
            return
          fi

          for feature_branch in "${feature_branches[@]}"; do
            echo "...found feature branch: $feature_branch"
          done
        }

        find_feature_branches

        function find_exempt_branches() {
          echo "Searching for exempt branches"
          IFS=',' read -r -a exempt_branches <<< "$input"

          if [ ${#exempt_branches[@]} -eq 0 ]; then
            echo "...none found"
            return
          fi

          for exempt_branch in "${exempt_branches[@]}"; do
            echo "...found exempt branch: $exempt_branch"
          done
        }

        find_exempt_branches

        function filter_feature_branches() {
          echo "Filtering branches"
          branches=()

          for feature_branch in "${feature_branches[@]}"; do
            if ! [[ "${exempt_branches[*]}" =~ "$feature_branch" ]]; then
              echo "...including feature branch: $feature_branch"
              branches+=("$feature_branch")
            else
              echo "...excluding feature branch: $feature_branch"
            fi
          done
        }

        filter_feature_branches

        function open_pr_and_merge() {
          local base_branch=$1
          local merge_branch=$2

          # Open PR if one doesn't already exist
          local pr_number
          pr_number=$(gh pr list --head "$merge_branch" --base "$base_branch" --state open --label auto-merge --json number --jq '.[0].number')

          if [ -z "$pr_number" ]; then
            echo "...opening PR from $merge_branch into $base_branch"
            pr_number=$(gh pr create \
              --base "$base_branch" \
              --head "$merge_branch" \
              --title "misc: merge main into $base_branch" \
              --label auto-merge \
              --body "Automated merge of main into \`$base_branch\`. If there are conflicts, please resolve manually." \
              | grep -oE '[0-9]+$')
          else
            echo "...PR #$pr_number already exists"
          fi

          # Enable auto-merge (fails gracefully if conflicts exist)
          echo "...enabling auto-merge on PR #$pr_number"
          gh pr merge "$pr_number" --merge --delete-branch --auto || echo "...auto-merge could not be enabled (likely conflicts), skipping"
        }

        function merge_main() {
          echo "Merging main into branches"

          if [ ${#branches[@]} -eq 0 ]; then
            echo "...no branches to merge into"
            return
          fi

          for branch in "${branches[@]}"; do
            echo "...processing branch: $branch"
            local merge_branch="main-into-$branch-merge"

            if git rev-parse --verify "refs/remotes/origin/$merge_branch" &>/dev/null; then
              echo "...merge branch $merge_branch already exists, updating"
              git switch "$merge_branch"
              git reset --hard origin/main
            else
              echo "...creating merge branch $merge_branch"
              git switch -c "$merge_branch" origin/main
            fi

            git push -u --force-with-lease origin "$merge_branch"
            open_pr_and_merge "$branch" "$merge_branch"
          done
        }

        merge_main